<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annexe Photos CECB Plus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Annexe Photos CECB Plus</h1>

        <div class="project-name-section">
            <label for="projectName">Nom du projet :</label>
            <div class="project-input-row">
                <input type="text" id="projectName" placeholder="Entrez le nom du projet">
                <button class="btn-save" id="saveBtn" title="Sauvegarder le projet">Sauvegarder</button>
                <button class="btn-new" id="newBtn" title="Nouveau projet">Nouveau</button>
            </div>
        </div>

        <div class="saved-projects-section" id="savedProjectsSection">
            <div class="saved-projects-header" id="toggleProjects">
                <h2>Projets sauvegardés</h2>
                <span class="toggle-arrow" id="toggleArrow">&#9660;</span>
            </div>
            <div class="project-list" id="projectList"></div>
        </div>

        <div class="photos-grid" id="photosGrid"></div>

        <div class="dropzone" id="dropzone">
            <div class="dropzone-content">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <p>Glissez-déposez vos photos ici ou cliquez pour sélectionner</p>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*" hidden>
        </div>

        <button class="generate-btn" id="generateBtn" disabled>
            Générer PDF
        </button>
    </div>

    <div class="notification" id="notification"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
